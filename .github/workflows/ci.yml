name: ci
on:
  push: { branches: [main, develop] }
  pull_request: { branches: [main, develop] }
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - run: dotnet restore backend/Forum.slnx
      - run: dotnet format backend/Forum.slnx --verify-no-changes
      - run: dotnet build backend/Forum.slnx -c Release --no-restore
      - run: dotnet test backend/Forum.slnx -c Release --no-build --logger trx
