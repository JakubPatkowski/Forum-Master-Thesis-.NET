<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/net-forum-design-system-fe5576d4-a5bb-4ce0-9b80-8abe4bac97b2/tokens/colors.css">
  <link rel="stylesheet" href="_ds/net-forum-design-system-fe5576d4-a5bb-4ce0-9b80-8abe4bac97b2/tokens/typography.css">
  <link rel="stylesheet" href="_ds/net-forum-design-system-fe5576d4-a5bb-4ce0-9b80-8abe4bac97b2/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/net-forum-design-system-fe5576d4-a5bb-4ce0-9b80-8abe4bac97b2/styles.css">
  <script src="_ds/net-forum-design-system-fe5576d4-a5bb-4ce0-9b80-8abe4bac97b2/_ds_bundle.js"></script>
  <style>
    @keyframes ws-pulse-cyan { 0% { box-shadow: 0 0 0 0 rgba(0,217,255,0.45); } 70% { box-shadow: 0 0 0 6px rgba(0,217,255,0); } 100% { box-shadow: 0 0 0 0 rgba(0,217,255,0); } }
    @keyframes ws-pulse-amber { 0% { box-shadow: 0 0 0 0 rgba(245,158,11,0.45); } 70% { box-shadow: 0 0 0 6px rgba(245,158,11,0); } 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0); } }
  </style>
</helmet>
<header data-screen-label="TopNav" style="background:var(--color-neutral-950); border-bottom:1px solid var(--color-border-default); font-family:var(--font-sans); position:relative; z-index:40">
  <div style="max-width:1400px; margin:0 auto; height:64px; padding:0 32px; display:flex; align-items:center; gap:24px">
    <a href="Home.dc.html" style="display:flex; align-items:center; gap:10px; text-decoration:none; flex-shrink:0">
      <span style="width:18px; height:18px; border:2px solid var(--color-cyan-base); display:grid; place-items:center">
        <span style="width:6px; height:6px; background:var(--color-accent-base); display:block"></span>
      </span>
      <span style="font-family:var(--font-mono); font-weight:700; font-size:15px; letter-spacing:0.08em; color:var(--color-text-primary)">FORUM<span style="color:var(--color-cyan-base)">://</span>SIGNAL</span>
    </a>
    <div style="flex:1; max-width:560px; margin:0 auto; position:relative">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--color-neutral-500)"><circle cx="11" cy="11" r="7"></circle><path d="M20.5 20.5 16 16"></path></svg>
      <input placeholder="Search threads, users, tags…" style="font-family:var(--font-mono); font-size:13px; width:100%; padding:9px 48px 9px 38px; background:var(--color-neutral-900); border:1px solid var(--color-border-default); border-radius:2px; color:var(--color-text-primary)" style-focus="border-color:var(--color-accent-base); background:var(--color-neutral-800); outline:none">
      <span style="position:absolute; right:10px; top:50%; transform:translateY(-50%); font-family:var(--font-mono); font-size:11px; color:var(--color-text-tertiary); border:1px solid var(--color-border-default); padding:1px 6px; border-radius:2px">⌘K</span>
    </div>
    <div style="display:flex; align-items:center; gap:14px; flex-shrink:0">
      <sc-if value="{{ isLive }}" hint-placeholder-val="{{ true }}">
        <span title="WebSocket connected" style="display:inline-flex; align-items:center; gap:8px; padding:5px 10px; border:1px solid var(--color-border-default); border-radius:2px; background:var(--color-neutral-900)">
          <span style="width:7px; height:7px; border-radius:50%; background:var(--color-cyan-base); animation:ws-pulse-cyan 2s ease-out infinite"></span>
          <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; color:var(--color-cyan-base)">LIVE</span>
        </span>
      </sc-if>
      <sc-if value="{{ isReconnecting }}" hint-placeholder-val="{{ false }}">
        <span title="WebSocket disconnected — trying to reconnect" style="display:inline-flex; align-items:center; gap:8px; padding:5px 10px; border:1px solid var(--color-border-default); border-radius:2px; background:var(--color-neutral-900)">
          <span style="width:7px; height:7px; border-radius:50%; background:var(--color-warning); animation:ws-pulse-amber 1.2s ease-out infinite"></span>
          <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; color:var(--color-warning)">RECONNECTING</span>
        </span>
      </sc-if>
      <sc-if value="{{ isOffline }}" hint-placeholder-val="{{ false }}">
        <span title="WebSocket offline" style="display:inline-flex; align-items:center; gap:8px; padding:5px 10px; border:1px solid var(--color-border-default); border-radius:2px; background:var(--color-neutral-900)">
          <span style="width:7px; height:7px; border-radius:50%; background:var(--color-error)"></span>
          <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; color:var(--color-error)">OFFLINE</span>
        </span>
      </sc-if>
      <sc-if value="{{ isAuthed }}" hint-placeholder-val="{{ true }}">
        <a href="Social.dc.html" title="Friends" style="position:relative; width:36px; height:36px; display:grid; place-items:center; border:1px solid var(--color-border-default); border-radius:2px; background:var(--color-neutral-900); color:var(--color-text-secondary)" style-hover="color:var(--color-cyan-base); border-color:var(--color-cyan-base)">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm-8 0a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-2.7 0-8 1.34-8 4v2h9v-2c0-1.6.77-2.9 1.96-3.79A11.9 11.9 0 0 0 8 13zm8 0c-.35 0-.72.02-1.1.06C16.09 14.06 17 15.36 17 17v2h7v-2c0-2.66-5.3-4-8-4z"></path></svg>
          <span style="position:absolute; top:5px; right:5px; min-width:14px; height:14px; padding:0 3px; display:grid; place-items:center; border-radius:7px; background:var(--color-cyan-base); color:var(--color-neutral-950); font-family:var(--font-mono); font-size:8px; font-weight:700">2</span>
        </a>
        <a href="Social.dc.html" title="Messages" style="position:relative; width:36px; height:36px; display:grid; place-items:center; border:1px solid var(--color-border-default); border-radius:2px; background:var(--color-neutral-900); color:var(--color-text-secondary)" style-hover="color:var(--color-accent-base); border-color:var(--color-accent-base)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H8l-5 4V5a1 1 0 0 1 1-1z"></path></svg>
          <span style="position:absolute; top:5px; right:5px; min-width:14px; height:14px; padding:0 3px; display:grid; place-items:center; border-radius:7px; background:var(--color-accent-base); color:var(--color-neutral-950); font-family:var(--font-mono); font-size:8px; font-weight:700">3</span>
        </a>
        <button title="Notifications" style="position:relative; width:36px; height:36px; display:grid; place-items:center; border:1px solid var(--color-border-default); border-radius:2px; background:var(--color-neutral-900); color:var(--color-text-secondary)" style-hover="color:var(--color-text-primary); border-color:var(--color-border-subtle)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2zm6-6v-5a6 6 0 1 0-12 0v5l-2 2v1h16v-1l-2-2z"></path></svg>
          <span style="position:absolute; top:6px; right:7px; width:6px; height:6px; border-radius:50%; background:var(--color-accent-base)"></span>
        </button>
        <div style="position:relative">
          <button onClick="{{ toggleMenu }}" style="display:flex; align-items:center; gap:10px; padding:4px 10px 4px 4px; border:1px solid var(--color-border-default); border-radius:2px; background:var(--color-neutral-900)" style-hover="border-color:var(--color-border-subtle)">
            <span style="width:28px; height:28px; display:grid; place-items:center; background:var(--color-accent-subtle); border:1px solid var(--color-accent-dark); font-family:var(--font-mono); font-size:12px; font-weight:700; color:var(--color-accent-base)">N</span>
            <span style="font-size:13px; font-weight:600; color:var(--color-text-primary)">nadia_dev</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--color-text-tertiary)"><path d="m6 9 6 6 6-6"></path></svg>
          </button>
          <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
            <div style="position:absolute; right:0; top:calc(100% + 8px); width:240px; background:var(--color-neutral-900); border:1px solid var(--color-border-default); border-radius:2px; box-shadow:var(--shadow-lg); z-index:60; display:flex; flex-direction:column; padding:6px">
              <div style="padding:10px 12px; border-bottom:1px solid var(--color-border-default); margin-bottom:6px">
                <div style="font-size:14px; font-weight:600; color:var(--color-text-primary)">Nadia Kowalczyk</div>
                <div style="font-family:var(--font-mono); font-size:11px; color:var(--color-text-tertiary); margin-top:2px">@nadia_dev · user</div>
              </div>
              <a href="Profile.dc.html" style="display:block; padding:9px 12px; font-size:13px; color:var(--color-text-secondary); text-decoration:none; border-radius:2px" style-hover="background:var(--color-neutral-800); color:var(--color-text-primary)">Your profile</a>
              <a href="Compose.dc.html" style="display:block; padding:9px 12px; font-size:13px; color:var(--color-text-secondary); text-decoration:none; border-radius:2px" style-hover="background:var(--color-neutral-800); color:var(--color-text-primary)">New thread</a>
              <div style="height:1px; background:var(--color-border-default); margin:6px 0"></div>
              <a href="Auth.dc.html" style="display:block; padding:9px 12px; font-size:13px; color:var(--color-text-secondary); text-decoration:none; border-radius:2px" style-hover="background:var(--color-neutral-800); color:var(--color-text-primary)">Log out</a>
              <a href="Auth.dc.html" style="display:block; padding:9px 12px; font-size:13px; color:var(--color-error-light); text-decoration:none; border-radius:2px" style-hover="background:rgba(239,68,68,0.12)">Log out all devices</a>
            </div>
          </sc-if>
        </div>
      </sc-if>
      <sc-if value="{{ isAnon }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex; align-items:center; gap:10px">
          <a href="Auth.dc.html" style="font-size:13px; font-weight:600; color:var(--color-accent-base); text-decoration:none; padding:8px 12px" style-hover="color:var(--color-accent-light)">Log in</a>
          <a href="Auth.dc.html" style="font-size:13px; font-weight:600; color:var(--color-text-inverse); background:var(--color-accent-base); text-decoration:none; padding:8px 16px; border-radius:var(--radius-sm)" style-hover="background:var(--color-accent-dark)">Register</a>
        </div>
      </sc-if>
    </div>
  </div>
  <nav style="border-top:1px solid var(--color-neutral-800)">
    <div style="max-width:1400px; margin:0 auto; padding:0 32px; display:flex; justify-content:space-between; align-items:baseline">
      <sc-if value="{{ notForum }}" hint-placeholder-val="{{ true }}"><a href="Home.dc.html" style="font-family:var(--font-mono); font-size:12px; letter-spacing:0.14em; color:var(--color-text-secondary); text-decoration:none; padding:14px 2px; border-bottom:2px solid transparent" style-hover="color:var(--color-text-primary)"><span style="color:var(--color-text-tertiary)">01</span> FORUM</a></sc-if>
      <sc-if value="{{ isForum }}" hint-placeholder-val="{{ false }}"><a href="Home.dc.html" style="font-family:var(--font-mono); font-size:12px; letter-spacing:0.14em; color:var(--color-accent-base); text-decoration:none; padding:14px 2px; border-bottom:2px solid var(--color-accent-base); font-weight:700"><span style="color:var(--color-accent-dark)">01</span> FORUM</a></sc-if>
      <sc-if value="{{ notSearch }}" hint-placeholder-val="{{ true }}"><a href="Search.dc.html" style="font-family:var(--font-mono); font-size:12px; letter-spacing:0.14em; color:var(--color-text-secondary); text-decoration:none; padding:14px 2px; border-bottom:2px solid transparent" style-hover="color:var(--color-text-primary)"><span style="color:var(--color-text-tertiary)">02</span> SEARCH</a></sc-if>
      <sc-if value="{{ isSearch }}" hint-placeholder-val="{{ false }}"><a href="Search.dc.html" style="font-family:var(--font-mono); font-size:12px; letter-spacing:0.14em; color:var(--color-accent-base); text-decoration:none; padding:14px 2px; border-bottom:2px solid var(--color-accent-base); font-weight:700"><span style="color:var(--color-accent-dark)">02</span> SEARCH</a></sc-if>
      <sc-if value="{{ notProfile }}" hint-placeholder-val="{{ true }}"><a href="Profile.dc.html" style="font-family:var(--font-mono); font-size:12px; letter-spacing:0.14em; color:var(--color-text-secondary); text-decoration:none; padding:14px 2px; border-bottom:2px solid transparent" style-hover="color:var(--color-text-primary)"><span style="color:var(--color-text-tertiary)">03</span> PROFILE</a></sc-if>
      <sc-if value="{{ isProfile }}" hint-placeholder-val="{{ false }}"><a href="Profile.dc.html" style="font-family:var(--font-mono); font-size:12px; letter-spacing:0.14em; color:var(--color-accent-base); text-decoration:none; padding:14px 2px; border-bottom:2px solid var(--color-accent-base); font-weight:700"><span style="color:var(--color-accent-dark)">03</span> PROFILE</a></sc-if>
      <sc-if value="{{ notAdmin }}" hint-placeholder-val="{{ true }}"><a href="Admin.dc.html" style="font-family:var(--font-mono); font-size:12px; letter-spacing:0.14em; color:var(--color-text-secondary); text-decoration:none; padding:14px 2px; border-bottom:2px solid transparent; display:inline-flex; align-items:center; gap:8px" style-hover="color:var(--color-text-primary)"><span style="color:var(--color-text-tertiary)">04</span> ADMIN <span style="font-size:10px; padding:1px 5px; border:1px solid var(--color-border-default); color:var(--color-text-tertiary)">MANAGE</span></a></sc-if>
      <sc-if value="{{ isAdmin }}" hint-placeholder-val="{{ false }}"><a href="Admin.dc.html" style="font-family:var(--font-mono); font-size:12px; letter-spacing:0.14em; color:var(--color-accent-base); text-decoration:none; padding:14px 2px; border-bottom:2px solid var(--color-accent-base); font-weight:700; display:inline-flex; align-items:center; gap:8px"><span style="color:var(--color-accent-dark)">04</span> ADMIN <span style="font-size:10px; padding:1px 5px; border:1px solid var(--color-accent-dark); color:var(--color-accent-base)">MANAGE</span></a></sc-if>
      <sc-if value="{{ notComponents }}" hint-placeholder-val="{{ true }}"><a href="Components.dc.html" style="font-family:var(--font-mono); font-size:12px; letter-spacing:0.14em; color:var(--color-text-tertiary); text-decoration:none; padding:14px 2px; border-bottom:2px solid transparent; display:inline-flex; align-items:center; gap:8px" style-hover="color:var(--color-cyan-base)">COMPONENTS <span style="font-size:10px; padding:1px 5px; border:1px solid var(--color-border-default); color:var(--color-text-tertiary)">DEV</span></a></sc-if>
      <sc-if value="{{ isComponents }}" hint-placeholder-val="{{ false }}"><a href="Components.dc.html" style="font-family:var(--font-mono); font-size:12px; letter-spacing:0.14em; color:var(--color-cyan-base); text-decoration:none; padding:14px 2px; border-bottom:2px solid var(--color-cyan-base); font-weight:700; display:inline-flex; align-items:center; gap:8px">COMPONENTS <span style="font-size:10px; padding:1px 5px; border:1px solid var(--color-cyan-base); color:var(--color-cyan-base)">DEV</span></a></sc-if>
    </div>
  </nav>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 140}, &quot;active&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;forum&quot;, &quot;search&quot;, &quot;profile&quot;, &quot;admin&quot;, &quot;components&quot;, &quot;none&quot;], &quot;default&quot;: &quot;forum&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Nav&quot;}, &quot;status&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;live&quot;, &quot;reconnecting&quot;, &quot;offline&quot;], &quot;default&quot;: &quot;live&quot;, &quot;tsType&quot;: &quot;'live' | 'reconnecting' | 'offline'&quot;, &quot;section&quot;: &quot;Realtime&quot;}, &quot;authed&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Session&quot;}}">
class Component extends DCLogic {
  state = { menuOpen: false };

  renderVals() {
    const active = this.props.active ?? "forum";
    const status = this.props.status ?? "live";
    const authed = this.props.authed ?? true;
    return {
      isForum: active === "forum", notForum: active !== "forum",
      isSearch: active === "search", notSearch: active !== "search",
      isProfile: active === "profile", notProfile: active !== "profile",
      isAdmin: active === "admin", notAdmin: active !== "admin",
      isComponents: active === "components", notComponents: active !== "components",
      isLive: status === "live",
      isReconnecting: status === "reconnecting",
      isOffline: status === "offline",
      isAuthed: authed, isAnon: !authed,
      menuOpen: this.state.menuOpen,
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
    };
  }
}
</script>
</body>
</html>
