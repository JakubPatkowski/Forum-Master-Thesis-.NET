# Only the ingress controller talks to the SPA shell — nothing inside the cluster ever calls the
# frontend (it serves static JS to browsers; the browser calls the API directly).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: frontend-allow, namespace: forum-dotnet }
spec:
  podSelector: { matchLabels: { app: frontend } }
  policyTypes: ["Ingress"]
  ingress:
    - from: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } } }]
      ports: [{ protocol: TCP, port: 3000 }]
