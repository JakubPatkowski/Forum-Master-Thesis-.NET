# AMQP from backend only; the prometheus endpoint (15692) from the monitoring namespace (10c,
# selector inert until it exists). The management UI (15672) is deliberately NOT allowed from
# anywhere — admin access is `make tunnels` (kubectl port-forward bypasses netpol via the API
# server, which is exactly the intended admin path).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: rabbitmq-allow, namespace: forum-dotnet }
spec:
  podSelector: { matchLabels: { app: rabbitmq } }
  policyTypes: ["Ingress"]
  ingress:
    - from: [{ podSelector: { matchLabels: { app: backend } } }]
      ports: [{ protocol: TCP, port: 5672 }]
    - from: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: monitoring } } }]
      ports: [{ protocol: TCP, port: 15692 }]
