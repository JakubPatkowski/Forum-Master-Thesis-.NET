# Copy to secret.yaml and fill real values (secret.yaml is gitignored).
# Normally you never need this file: scripts/deploy.sh generates the secret from .env when neither
# secret.yaml nor an in-cluster secret exists (generate-if-missing).
# CONNECTION_STRING is consumed by the backend + migration/seed Jobs. `Maximum Pool Size=30` is
# LOAD-BEARING (G8): Npgsql defaults to 100 per process and all five module DbContexts share one
# string/pool; 3 replicas x 30 + exporter + transient Job + psql sessions <= max_connections=100.
# See k8s/postgres/statefulset.yaml header for the full pool math.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: forum-dotnet
type: Opaque
stringData:
  POSTGRES_DB: forum_net
  POSTGRES_USER: forum
  POSTGRES_PASSWORD: change-me
  CONNECTION_STRING: "Host=postgres;Database=forum_net;Username=forum;Password=change-me;Maximum Pool Size=30"
