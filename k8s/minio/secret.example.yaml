# Copy to secret.yaml and fill real values (secret.yaml is gitignored).
# Normally you never need this file: scripts/deploy.sh generates the secret from .env
# (generate-if-missing). MINIO_ROOT_* seed the server; the Storage__* duplicates are the exact
# .NET config keys the backend binds (MinioObjectStorage credentials) — one source, no drift.
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: forum-dotnet
type: Opaque
stringData:
  MINIO_ROOT_USER: minio
  MINIO_ROOT_PASSWORD: change-me
  Storage__AccessKey: minio
  Storage__SecretKey: change-me
