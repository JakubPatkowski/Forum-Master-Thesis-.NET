# Loki values (Phase 10c). Tested against chart grafana/loki 7.0.0 (Loki 3.6.x).
# SingleBinary on filesystem storage — the current supported minimal shape (the reference repo's
# loki-stack chart is deprecated/frozen upstream). Storage is DISPOSABLE by design: retention 24h,
# no PVC — benchmark evidence is exported to thesis/, not retained in Loki.
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2026-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index: { prefix: index_, period: 24h }
  limits_config:
    retention_period: 24h
    # k6 runs flood logs; without ingestion caps Loki OOMs (diagnosed in the reference repo).
    ingestion_rate_mb: 8
    ingestion_burst_size_mb: 16
    reject_old_samples: true
    reject_old_samples_max_age: 24h
  compactor:
    retention_enabled: true
    delete_request_store: filesystem

singleBinary:
  replicas: 1
  persistence: { enabled: false }   # disposable demo storage (see header)
  # persistence=false only drops the PVC — the chart mounts NOTHING at /var/loki and the container
  # rootfs is read-only, so Loki crashloops on "mkdir /var/loki: read-only file system" (found
  # live). An emptyDir is the actual "disposable storage" the plan intended:
  extraVolumes:
    - name: loki-storage
      emptyDir: {}
  extraVolumeMounts:
    - name: loki-storage
      mountPath: /var/loki
  resources:
    requests: { cpu: 150m, memory: 384Mi }
    limits: { cpu: 800m, memory: 768Mi }

# deploymentMode: SingleBinary does NOT zero the SimpleScalable components by itself —
# their replica defaults are 3/3/3 in chart 7.x and must be zeroed explicitly.
write: { replicas: 0 }
read: { replicas: 0 }
backend: { replicas: 0 }

# Everything below is budget: no gateway (Grafana talks straight to loki:3100), no canary,
# no memcached caches, no helm-test pod, no rules sidecar (rules live in Prometheus, not Loki).
gateway: { enabled: false }
lokiCanary: { enabled: false }
test: { enabled: false }
chunksCache: { enabled: false }
resultsCache: { enabled: false }
sidecar:
  rules: { enabled: false }
