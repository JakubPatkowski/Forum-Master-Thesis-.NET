apiVersion: v1
kind: ConfigMap
metadata: { name: backend-config, namespace: forum-dotnet, labels: { app: backend } }
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  # G11: traces export straight to Tempo's OTLP ingest (no otel-collector indirection). The Service
  # appears with the Phase 10c monitoring stack; until then exports fail quietly and cheaply.
  Otlp__Endpoint: "http://tempo.monitoring.svc.cluster.local:4317"
  RabbitMq__Host: "rabbitmq"
  # Internal S3 endpoint for server-side ops; PublicEndpoint is what presigned URLs are signed for
  # (G5 — the browser hits https://minio.forum.local via ingress, and SigV4 binds the Host header).
  Storage__Endpoint: "minio:9000"
  Storage__PublicEndpoint: "minio.forum.local"
  Storage__PublicUseSsl: "true"
  # The SPA origin (G13/G20) — without this the deployed frontend would be CORS-blocked
  # (appsettings.json only allows localhost dev origins). http kept for the ssl-redirect edge.
  Cors__AllowedOrigins__0: "https://forum.local"
  Cors__AllowedOrigins__1: "http://forum.local"
  # G6: trust X-Forwarded-For/-Proto ONLY from the pod network (ingress-nginx lives there).
  # 10.244.0.0/16 verified live on this cluster: kube-controller-manager --cluster-cidr under
  # minikube --cni=calico. Correct here if the CNI/CIDR ever changes.
  ForwardedHeaders__KnownNetworks__0: "10.244.0.0/16"
  # Rate limiter is per-IP fixed-window (RateLimitingExtensions). Behind ingress, X-Forwarded-For
  # collapses a whole browser session onto ONE partition, and the SPA fans a single feed render out
  # to dozens of parallel calls (per-category merge + /reactions + /files + /tags + realtime resync).
  # The code default of 100/min is a production posture that a single interactive browser trips on
  # refresh -> 429 -> the "SIGNAL LOST" error boundary. 1000/min comfortably absorbs those bursts on
  # this single-tenant cluster while still bounding a runaway loop; Auth stays tight (credential-stuffing).
  RateLimiting__Global__PermitLimit: "1000"
  RateLimiting__Auth__PermitLimit: "50"
  # 10d #3 — Argon2id burst headroom: each login/register burns ~400ms of pure CPU on a worker
  # thread (measured via Tempo: POST /api/identity/login ≈ 409ms, of which <5ms is SQL). With a
  # 750m CPU limit the runtime sees 1 processor, so the default min-thread floor is ~1 and a login
  # burst starves the pool — hill-climbing adds threads at ~1-2/s, which shows up as p99 spikes on
  # the first benchmark ramp step. Pre-warming the floor to 64 removes that warm-up cliff.
  DOTNET_ThreadPool_MinThreads: "64"
