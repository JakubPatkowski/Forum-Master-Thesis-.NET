# Copy to secret.yaml and fill real values (secret.yaml is gitignored).
# Normally you never need this file: scripts/deploy.sh generates the secret (generate-if-missing;
# key from .env JWT_SIGNING_KEY or `openssl rand -base64 48`). Without it the backend + Jobs refuse
# to boot in Production (Phase 9a fail-fast, G19) — that refusal is the feature, not a bug.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: forum-dotnet
type: Opaque
stringData:
  Jwt__SigningKey: "change-me-to-32-plus-random-bytes (openssl rand -base64 48)"
