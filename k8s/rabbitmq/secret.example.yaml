# Copy to secret.yaml and fill real values (secret.yaml is gitignored).
# Normally you never need this file: scripts/deploy.sh generates the secret (generate-if-missing,
# password from .env RABBITMQ_PASSWORD or freshly random). The RABBITMQ_DEFAULT_* keys seed the
# broker's first boot (G14 — `guest` is loopback-only); the RabbitMq__* duplicates are the exact
# .NET config keys the backend binds, so broker and backend can never drift apart.
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: forum-dotnet
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: forum
  RABBITMQ_DEFAULT_PASS: change-me
  RabbitMq__Username: forum
  RabbitMq__Password: change-me
