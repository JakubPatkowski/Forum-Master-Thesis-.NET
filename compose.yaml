name: forum-dotnet
services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forum_net}
      POSTGRES_USER: ${POSTGRES_USER:-forum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forum_dev_only}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forum} -d ${POSTGRES_DB:-forum_net}"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    ports: ["5672:5672", "15672:15672"]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_dev_only}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  # Backend is normally run from the IDE / scripts/dev-api.sh against the services above.
  # Uncomment to run the containerized API end-to-end (parity check for the production image).
  #   1. docker compose up -d --build api        (image builds from the root Dockerfile)
  #   2. docker compose run --rm api migrate     (arg appends to ENTRYPOINT -> `dotnet Forum.Api.dll migrate`)
  # The runtime image is chiseled (NO shell): a healthcheck here must be TCP-based or absent —
  # never curl/CMD-SHELL. ASPNETCORE_ENVIRONMENT=Development is required: without it the
  # container boots as Production and the Jwt:SigningKey fail-fast (Phase 9a) stops it.
  api:
    build: { context: ., dockerfile: Dockerfile }
    depends_on: { postgres: { condition: service_healthy } }
    ports: ["8080:8080"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Forum: "Host=postgres;Database=${POSTGRES_DB:-forum_net};Username=${POSTGRES_USER:-forum};Password=${POSTGRES_PASSWORD:-forum_dev_only}"
      RabbitMq__Host: rabbitmq
      Storage__Endpoint: "minio:9000"
      # Presigned URLs must be usable from the HOST browser -> sign against the published port.
      Storage__PublicEndpoint: "localhost:9000"
      Storage__AccessKey: ${MINIO_ROOT_USER:-minio}
      Storage__SecretKey: ${MINIO_ROOT_PASSWORD:-minio_dev_only}

volumes:
  pgdata:
  miniodata:
