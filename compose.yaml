name: forum-dotnet
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: forum_net
      POSTGRES_USER: forum
      POSTGRES_PASSWORD: forum_dev_only
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forum -d forum_net"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    ports: ["5672:5672", "15672:15672"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_dev_only
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  # Backend is normally run from the IDE against the services above.
  # Uncomment to run the containerized API end-to-end:
  # api:
  #   build: { context: ., dockerfile: Dockerfile }
  #   depends_on: { postgres: { condition: service_healthy } }
  #   ports: ["8080:8080"]
  #   environment:
  #     ConnectionStrings__Forum: "Host=postgres;Database=forum_net;Username=forum;Password=forum_dev_only"

volumes:
  pgdata:
  miniodata:
